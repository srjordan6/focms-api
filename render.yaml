services:
  - type: web
    name: focms-api
    runtime: python
    plan: starter
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn focms_api:app --host 0.0.0.0 --port 10000
    healthCheckPath: /focms/v1/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_POOLED
        sync: false
      - key: SCORECARD_API_KEY
        sync: false
      - key: FOCMS_API_TOKENS_JSON
        sync: false
      - key: FOCMS_API_LOG_LEVEL
        value: INFO
      - key: FOCMS_WORKER_LOG_LEVEL
        value: INFO

# All cron jobs live in the focms-scraper repo (Render service: NorthStar-Scraper,
# entry point focms_nightly_jobs.py). nces_scorecard_worker.py remains here only
# as the historical original; the running copy is in focms-scraper.
